<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5ea1"/>
      <stop offset="50%" stop-color="#b794f4"/>
      <stop offset="100%" stop-color="#ffc857"/>
    </linearGradient>
    <radialGradient id="ear" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff0f6"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </radialGradient>
  </defs>
  <!-- Fundo gradient com cantos arredondados (maskable safe area: 80% central) -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Ursinho desenhado com paths (centralizado em 256,256, area segura ~205px raio) -->
  <g transform="translate(256 270)">
    <!-- Orelhas (atras) -->
    <circle cx="-95" cy="-95" r="40" fill="#a87c50"/>
    <circle cx="95" cy="-95" r="40" fill="#a87c50"/>
    <circle cx="-95" cy="-95" r="22" fill="url(#ear)"/>
    <circle cx="95" cy="-95" r="22" fill="url(#ear)"/>

    <!-- Cabeca -->
    <ellipse cx="0" cy="-30" rx="115" ry="105" fill="#c89567"/>

    <!-- Focinho -->
    <ellipse cx="0" cy="20" rx="65" ry="50" fill="#fff0d4"/>

    <!-- Olhos -->
    <ellipse cx="-38" cy="-35" rx="11" ry="13" fill="#2d1b3d"/>
    <ellipse cx="38" cy="-35" rx="11" ry="13" fill="#2d1b3d"/>
    <circle cx="-34" cy="-39" r="4" fill="#fff"/>
    <circle cx="42" cy="-39" r="4" fill="#fff"/>

    <!-- Nariz -->
    <ellipse cx="0" cy="5" rx="14" ry="10" fill="#2d1b3d"/>

    <!-- Boquinha -->
    <path d="M 0 18 Q -10 32 -18 28 M 0 18 Q 10 32 18 28" stroke="#2d1b3d" stroke-width="5" stroke-linecap="round" fill="none"/>

    <!-- Coracao no peito -->
    <path d="M 0 105 C -25 80, -55 90, -55 115 C -55 140, -28 160, 0 180 C 28 160, 55 140, 55 115 C 55 90, 25 80, 0 105 Z" fill="#ff5ea1" opacity="0.85"/>
  </g>
</svg>
